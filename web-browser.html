<section>
  <h1>WEB BROWSER</h1>
  <p class="category-meta">Here are listed 62 programs and 0 items for this category.</p>
  <div id="app-list" data-category="web-browser"></div>
</section>

<a href="#" id="back-to-top" title="Back to top">&uarr;</a>

<script>
fetch('categories/web-browser.json')
  .then(function(r) { return r.json() })
  .then(function(data) {
    var html = '<div class="app-list">';
    for (var i = 0; i < data.length; i++) {
      var app = data[i];
      html += '<div class="app-item">';
      html += '<img loading="lazy" src="icons/' + app.icon + '" width="48" height="48" alt="" class="app-icon">';
      html += '<div class="app-body">';
      html += '<a href="app.html?name=' + encodeURIComponent(app.name) + '" class="app-name"><strong>' + app.name + '</strong></a>';
      html += '<p class="app-desc">' + app.description + '</p>';
      html += '</div>';
      html += '<div class="app-links">';
      html += '<a href="' + app.installer_blob + '" class="install-link">blob</a>';
      html += '<a href="' + app.installer_raw + '" class="install-link">raw</a>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
    document.getElementById('app-list').innerHTML = html;
  })
  .catch(function(err) {
    document.getElementById('app-list').innerHTML = '<p>Failed to load apps.</p>';
  });

var btt = document.getElementById('back-to-top');
window.addEventListener('scroll', function() {
  btt.classList.toggle('btt-visible', window.scrollY > 300);
});
</script>
